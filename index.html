<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEON Dev</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Particles -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <h1>Loading...</h1>
</div>

<!-- PARTICLES BG -->
<div id="particles-js"></div>

<!-- NAVBAR -->
<header>
  <nav>
    <h2 class="logo">NEON.dev</h2>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul id="menu">
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <h1>I’m <span id="typing"></span></h1>
  <p>Building modern web experiences</p>

  <div class="socials">
    <i class="fab fa-github"></i>
    <i class="fab fa-linkedin"></i>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="fade glass">
  <h2>About Me</h2>
  <p>Passionate web developer creating modern, responsive and fast websites.</p>
</section>

<!-- PROJECTS -->
<section id="projects" class="fade">
  <h2>Projects</h2>

  <div class="projects-grid">
    <div class="card">
      <div class="overlay">View Project</div>
      <h3>Portfolio</h3>
    </div>

    <div class="card">
      <div class="overlay">View Project</div>
      <h3>E-Commerce</h3>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="fade glass">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<script src="script.js"></script>
</body>
</html>
